<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Portfolio Data Grabber</title>
  <style>
    body { margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e1e4ea; }
    h3 { margin: 0 0 8px; font-size: 16px; }
    p { color: #8b8fa3; font-size: 13px; margin: 0 0 16px; }
    .status { padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
    .status.ok { background: rgba(0,212,161,.1); color: #00d4a1; }
    .status.loading { background: rgba(108,92,231,.1); color: #a29bfe; }
    .status.error { background: rgba(255,92,92,.1); color: #ff5c5c; }
    .stats { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .stat { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 8px; padding: 12px 16px; min-width: 120px; }
    .stat-label { font-size: 10px; text-transform: uppercase; color: #8b8fa3; letter-spacing: .5px; }
    .stat-val { font-size: 18px; font-weight: 700; margin-top: 2px; }
    button {
      background: #6c5ce7; color: #fff; border: none; border-radius: 8px;
      padding: 12px 24px; font-size: 14px; font-weight: 600; cursor: pointer;
      margin-right: 8px; margin-bottom: 8px;
    }
    button:hover { opacity: .85; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button.secondary { background: #2a2d3a; }
    textarea { width: 100%; height: 100px; background: #1a1d27; color: #e1e4ea; border: 1px solid #2a2d3a; border-radius: 8px; padding: 8px; font-size: 11px; font-family: monospace; margin-top: 8px; resize: vertical; }
  </style>
  <script type="text/javascript" src="https://wealthica.github.io/wealthica.js/dist/addon.min.js"></script>
  <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
</head>
<body>
  <h3>Portfolio Data Grabber</h3>
  <p>Fetches your positions and transactions from Wealthica, then exports as JSON for the standalone dashboard.</p>

  <div class="status loading" id="status">Connecting to Wealthica...</div>

  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="stat-label">Positions</div><div class="stat-val" id="nPos">0</div></div>
    <div class="stat"><div class="stat-label">Transactions</div><div class="stat-val" id="nTx">0</div></div>
    <div class="stat"><div class="stat-label">Market Value</div><div class="stat-val" id="nMV">--</div></div>
    <div class="stat"><div class="stat-label">Gain/Loss</div><div class="stat-val" id="nGL">--</div></div>
  </div>

  <div id="actions" style="display:none">
    <button id="btnExport">Download JSON for Dashboard</button>
    <button id="btnRefresh" class="secondary">Refresh Data</button>
    <details style="margin-top:12px">
      <summary style="cursor:pointer;color:#8b8fa3;font-size:12px">Preview raw data</summary>
      <textarea id="preview" readonly></textarea>
    </details>
  </div>

  <script type="text/javascript">
    var addon, addonOptions;
    var portfolioData = null;

    $(function () {
      addon = new Addon();

      addon.on('init', function (options) {
        addonOptions = options;
        fetchAll();
      }).on('update', function (options) {
        addonOptions = $.extend(addonOptions, options);
        fetchAll();
      }).on('reload', function () {
        fetchAll();
      });

      $('#btnRefresh').on('click', function () { fetchAll(); });

      $('#btnExport').on('click', function () {
        if (!portfolioData) return;
        var json = JSON.stringify(portfolioData, null, 2);
        var today = new Date().toISOString().substring(0, 10);
        addon.downloadFile({
          fileName: 'wealthica-export-' + today + '.json',
          fileType: 'application/json',
          fileContent: json
        }).then(function () {
          setStatus('ok', 'JSON downloaded! Open dashboard.html and load the file.');
        }).catch(function () {
          var blob = new Blob([json], { type: 'application/json' });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = 'wealthica-export-' + today + '.json';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          setStatus('ok', 'JSON downloaded! Open dashboard.html and load the file.');
        });
      });

      function buildQuery() {
        if (!addonOptions) return {};
        return {
          from: addonOptions.dateRangeFilter && addonOptions.dateRangeFilter[0],
          to: addonOptions.dateRangeFilter && addonOptions.dateRangeFilter[1],
          groups: addonOptions.groupsFilter,
          institutions: addonOptions.institutionsFilter,
          investments: addonOptions.investmentsFilter === 'all' ? null : addonOptions.investmentsFilter
        };
      }

      function fetchAll() {
        setStatus('loading', 'Fetching your portfolio data...');
        $('#btnExport').attr('disabled', true);
        var query = buildQuery();

        Promise.all([
          addon.api.getPositions(query),
          addon.api.getTransactions(query),
          addon.request({ method: 'GET', endpoint: 'history', query: query })
        ]).then(function (results) {
          portfolioData = {
            exportDate: new Date().toISOString(),
            positions: results[0] || [],
            transactions: results[1] || [],
            history: results[2] || []
          };

          var tm = 0, tb = 0;
          portfolioData.positions.forEach(function (p) {
            tm += (p.market_value || 0);
            tb += (p.book_value || 0);
          });
          var gl = tm - tb;

          $('#nPos').text(portfolioData.positions.length);
          $('#nTx').text(portfolioData.transactions.length);
          $('#nMV').text('$' + tm.toLocaleString('en-CA', { minimumFractionDigits: 0, maximumFractionDigits: 0 }));
          var glEl = $('#nGL');
          glEl.text((gl >= 0 ? '+$' : '-$') + Math.abs(gl).toLocaleString('en-CA', { minimumFractionDigits: 0, maximumFractionDigits: 0 }));
          glEl.css('color', gl >= 0 ? '#00d4a1' : '#ff5c5c');

          $('#preview').val(JSON.stringify(portfolioData, null, 2).substring(0, 5000) + '\n...');
          $('#stats').show();
          $('#actions').show();
          $('#btnExport').removeAttr('disabled');
          setStatus('ok', 'Ready! ' + portfolioData.positions.length + ' positions, ' + portfolioData.transactions.length + ' transactions loaded.');
        }).catch(function (err) {
          setStatus('error', 'Error: ' + (err.message || err));
        });
      }

      function setStatus(type, msg) {
        $('#status').attr('class', 'status ' + type).text(msg);
      }
    });
  </script>
</body>
</html>
